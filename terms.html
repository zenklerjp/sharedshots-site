<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SharedShots — Terms of Service</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="wrap">
    <a class="brand" href="./index.html"><span class="dot"></span> SharedShots</a>
    <main id="content">Loading…</main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    fetch('./terms.md')
      .then(function (r) { return r.text(); })
      .then(function (t) { document.getElementById('content').innerHTML = marked.parse(t); })
      .catch(function () {
        document.getElementById('content').textContent =
          'Could not load the terms. Email support@sharedshots.app.';
      });
  </script>
</body>
</html>
